<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Modern Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }
        .detail-image {
            width: 100%;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .detail-price {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .detail-description {
            font-size: 1.1rem;
            color: var(--light-text);
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        @media (max-width: 768px) {
            .product-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Modern Shop</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="affiliate.html">Affiliate</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="product-detail-container">
            <!-- Product details will be injected here -->
        </div>

        <div class="ad-banner" style="margin-top: 4rem;">
            PROMOTIONAL AD: Contact 09308004394 (GCash) to place your ad here!
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Modern Shop. All rights reserved.</p>
    </footer>

    <script type="module">
        import products from './products.js';
        import { initChat } from './chat.js';
        import { initAffiliateTracking } from './affiliate-tracker.js';
        import { formatPrice, updateCartCount } from './utils.js';

        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        let currentCurrency = localStorage.getItem('currency') || 'USD';

        function initCurrency() {
            const select = document.getElementById('currency-select');
            if (!select) return;
            select.value = currentCurrency;
            select.addEventListener('change', (e) => {
                currentCurrency = e.target.value;
                localStorage.setItem('currency', currentCurrency);
                renderDetails();
            });
        }

        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItem = cart.find(item => item.id === product.id);
            
            if (cartItem) {
                cartItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(`${product.name} added to cart!`);
        }

        function renderDetails() {
            const container = document.getElementById('product-detail-container');
            const product = products.find(p => p.id === productId);

            if (!product) {
                container.innerHTML = '<h1>Product not found</h1><a href="index.html">Back to Home</a>';
                return;
            }

            container.innerHTML = `
                <div class="product-details">
                    <img src="${product.image}" alt="${product.name}" class="detail-image">
                    <div class="detail-info">
                        <h1>${product.name}</h1>
                        <p class="detail-price">${formatPrice(product.price, currentCurrency)}</p>
                        <p class="detail-description">${product.description}</p>
                        <button class="btn btn-primary" id="add-btn" style="width: auto; padding: 1rem 3rem;">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('add-btn').addEventListener('click', () => addToCart(product));
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDetails();
            updateCartCount();
            initChat();
            initAffiliateTracking();
            initCurrency();
        });
    </script>
</body>
</html>
