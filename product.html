<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | MultiHub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .detail-image {
            width: 100%;
            border-radius: 8px;
            object-fit: contain;
            max-height: 500px;
        }
        .detail-info h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text);
        }
        .detail-price {
            font-size: 1.8rem;
            color: #B12704;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .detail-description {
            font-size: 1rem;
            color: var(--light-text);
            margin-bottom: 2rem;
            line-height: 1.6;
            white-space: pre-line;
        }
        .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        .specs-table tr {
            border-bottom: 1px solid #eee;
        }
        .specs-table td {
            padding: 0.8rem 0;
        }
        .specs-label {
            font-weight: 700;
            width: 150px;
        }
        @media (max-width: 768px) {
            .product-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html" class="logo">MultiHub</a>
            <div class="header-tools" style="margin-left: auto;">
                <div class="language-selector">
                    <select id="language-select">
                        <option value="en">English</option>
                        <option value="de">Deutsch</option>
                        <option value="zh">中文</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                        <option value="it">Italiano</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="ar">العربية</option>
                        <option value="ru">Русский</option>
                    </select>
                </div>
                <div class="currency-selector">
                    <select id="currency-select">
                        <option value="USD">USD ($)</option>
                        <option value="AED">AED (د.إ)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html" id="nav-home">Home</a></li>
                        <li><a href="affiliate.html" id="nav-affiliate">Affiliate</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div id="product-detail-container">
            <!-- Product details will be injected here -->
        </div>

        <div class="ad-banner" id="ad-text-product" style="margin-top: 4rem;">
            PROMOTIONAL AD: Contact 09308004394 (GCash) to place your ad here!
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Modern Shop. All rights reserved.</p>
    </footer>

    <script type="module">
        import products from './products.js';
        import { initChat } from './chat.js';
        import { initAffiliateTracking } from './affiliate-tracker.js';
        import { formatPrice, updateCartCount, applyTranslations } from './utils.js';

        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        let currentCurrency = localStorage.getItem('currency') || 'USD';
        let currentLanguage = localStorage.getItem('language') || 'en';

        function initCurrency() {
            const select = document.getElementById('currency-select');
            if (!select) return;
            select.value = currentCurrency;
            select.addEventListener('change', (e) => {
                currentCurrency = e.target.value;
                localStorage.setItem('currency', currentCurrency);
                renderDetails();
            });
        }

        function initLanguage() {
            const select = document.getElementById('language-select');
            if (!select) return;
            select.value = currentLanguage;
            select.addEventListener('change', (e) => {
                currentLanguage = e.target.value;
                localStorage.setItem('language', currentLanguage);
                applyTranslations(currentLanguage);
                renderDetails();
            });
        }

        function renderDetails() {
            const container = document.getElementById('product-detail-container');
            const product = products.find(p => p.id === productId);

            if (!product) {
                container.innerHTML = '<h1>Product not found</h1><a href="index.html">Back to Home</a>';
                return;
            }

            let specsHtml = '';
            if (product.specs) {
                specsHtml = `
                    <table class="specs-table">
                        ${Object.entries(product.specs).map(([label, value]) => `
                            <tr>
                                <td class="specs-label">${label}</td>
                                <td>${value}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
            }

            container.innerHTML = `
                <div class="product-details">
                    <img src="${product.image}" alt="${product.name}" class="detail-image">
                    <div class="detail-info">
                        <h1>${product.name}</h1>
                        <p class="detail-price">${formatPrice(product.price, currentCurrency)}</p>
                        <p class="detail-description">${product.description}</p>
                        ${specsHtml}
                        <div style="margin-top: 2rem;">
                            <a href="${product.affiliateLink}" target="_blank" class="btn" style="width: auto; padding: 1rem 3rem; text-decoration: none; display: inline-block;">
                                <span class="buy-button-text">Buy on Alibaba</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            applyTranslations(currentLanguage);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDetails();
            updateCartCount();
            initChat();
            initAffiliateTracking();
            initCurrency();
            initLanguage();
        });
    </script>
</body>
</html>
