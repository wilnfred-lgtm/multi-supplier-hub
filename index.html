<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop | E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Modern Shop</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Products</a></li>
                <li class="cart-icon">
                    <a href="cart.html">Cart <span id="cart-count">0</span></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Upgrade Your Style</h1>
            <p>Discover our latest collection of essentials.</p>
        </section>

        <div class="ad-banner">
            AD SPACE: Your Promotion Could Be Here!
        </div>

        <section id="products">
            <div class="product-grid" id="product-container">
                <!-- Products will be injected here by app.js -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Modern Shop. All rights reserved.</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
