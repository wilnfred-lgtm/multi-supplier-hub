<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop | E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Modern Shop</a>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search products or keywords...">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Products</a></li>
                <li class="cart-icon">
                    <a href="cart.html">Cart <span id="cart-count">0</span></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Upgrade Your Style</h1>
            <p>Discover our latest collection of essentials.</p>
        </section>

        <div class="ad-banner">
            AD SPACE: Want to promote here? Contact us via Chat or pay via GCash: 09308004394
        </div>

        <div class="catalog-layout">
            <aside class="category-sidebar">
                <h3>Categories</h3>
                <ul class="category-list" id="category-list">
                    <li class="active" data-category="all">All Products</li>
                    <!-- Categories will be injected here -->
                </ul>
            </aside>

            <section id="products">
                <div class="product-grid" id="product-container">
                    <!-- Products will be injected here by app.js -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Modern Shop. All rights reserved.</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
